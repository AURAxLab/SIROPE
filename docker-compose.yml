# ============================================================
# SIROPE — Docker Compose
# ============================================================
# Uso:
#   docker compose up -d         # Arrancar
#   docker compose logs -f       # Ver logs
#   docker compose down          # Parar
#   docker compose down -v       # Parar + borrar datos
# ============================================================

services:
  sirope:
    build: .
    container_name: sirope
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-cambiar-este-secreto-en-produccion}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - SEED_ON_INIT=${SEED_ON_INIT:-true}
    volumes:
      - sirope-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sirope-data:
    driver: local
